# Netlify configuration — TOWER Umar Strategy Lab
# Monorepo: Next.js app lives in apps/web/

[build]
  base    = "apps/web"
  command = "npm install && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_PUBLIC_RUNTIME_ENV = "preview"

[[plugins]]
  package = "@netlify/plugin-nextjs"
